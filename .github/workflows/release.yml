name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: CGO_ENABLED=0 go test -tags headless ./internal/...

      - name: Build all platforms
        run: |
          VERSION=${GITHUB_REF_NAME}

          # Linux AMD64 (servers, VPS, cPanel headless)
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -tags headless \
            -ldflags="-s -w -X codeforge/cmd.Version=${VERSION}" \
            -o dist/codeforge-linux-amd64 .

          # Linux ARM64 (Raspberry Pi, AWS Graviton)
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -tags headless \
            -ldflags="-s -w -X codeforge/cmd.Version=${VERSION}" \
            -o dist/codeforge-linux-arm64 .

          # macOS ARM (Apple Silicon M1/M2/M3)
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -tags headless \
            -ldflags="-s -w -X codeforge/cmd.Version=${VERSION}" \
            -o dist/codeforge-macos-arm64 .

          # macOS Intel
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -tags headless \
            -ldflags="-s -w -X codeforge/cmd.Version=${VERSION}" \
            -o dist/codeforge-macos-amd64 .

          # Windows
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -tags headless \
            -ldflags="-s -w -X codeforge/cmd.Version=${VERSION}" \
            -o dist/codeforge-windows-amd64.exe .

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CodeForge ${{ github.ref_name }}"
          body: |
            ## 🚀 CodeForge ${{ github.ref_name }}

            ### Download the right binary for your platform:

            | Platform | Binary |
            |---|---|
            | Linux x64 (VPS, server, cPanel) | `codeforge-linux-amd64` |
            | Linux ARM64 (Raspberry Pi, AWS Graviton) | `codeforge-linux-arm64` |
            | macOS Apple Silicon (M1/M2/M3) | `codeforge-macos-arm64` |
            | macOS Intel | `codeforge-macos-amd64` |
            | Windows | `codeforge-windows-amd64.exe` |

            ### Quick Install (Linux/macOS):
            ```bash
            # Linux AMD64
            curl -L https://github.com/khajum-sanjog/CodeForge/releases/download/${{ github.ref_name }}/codeforge-linux-amd64 -o codeforge
            chmod +x codeforge
            sudo mv codeforge /usr/local/bin/

            # Verify
            codeforge --version
            ```

            ### Full installation docs: https://codeforge.khajumsanjog.com
          files: |
            dist/codeforge-linux-amd64
            dist/codeforge-linux-arm64
            dist/codeforge-macos-arm64
            dist/codeforge-macos-amd64
            dist/codeforge-windows-amd64.exe
            dist/checksums.txt
          draft: false
          prerelease: false
